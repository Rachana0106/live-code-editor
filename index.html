<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="code-editor-container">
        <div class="code-editor html-editor">
            <div class="head-editor">
                <div class="left-head">
                    <img src="assets/html-logo.png" alt="HTML Icon" class="icon-head" width="52px">
                    <span>HTML</span>
                </div>

                <div class="right-head">
                    <img src="assets/copy.svg" alt="" class="copy copy1">
                </div>

            </div>
            <textarea class="html-input" spellcheck="false"></textarea>
        </div>


        <div class="code-editor css-editor">
           <div class="head-editor">
            <div class="left-head">
                <img src="assets/css-logo.png" alt="CSS Icon" class="icon-head" width="40px">
                    <span>CSS</span>
            </div>

            <div class="right-head">
                <img src="assets/copy.svg" alt="copy" class="copy copy2">
            </div>

           </div> 
           
            <textarea class="css-input" spellcheck="false"></textarea>
        </div>

        <div class="code-editor js-editor">
           <div class="head-editor">
            <div class="left-head">
                <img src="assets/javascript-logo.png" alt="JavaScript Icon" class="icon-head" width="48px">
                    <span>JAVASCRIPT</span>
            </div>

            <div class="right-head">
                <img src="assets/copy.svg" alt="" class="copy copy3">
            </div>

           </div> 
           
            <textarea class="js-input" spellcheck="false"></textarea>
        </div>



    </div>

    <div class="output-container">
        <div class="output-head">
            <span>OUTPUT</span>
            <img id="save" src="assets/save.svg" alt="save">
            <img src="assets/full.svg" alt="full" id="full">

        </div>


        <iframe id="output">


        </iframe>

    </div>

    <script src="script.js"></script>
</body>
</html>
